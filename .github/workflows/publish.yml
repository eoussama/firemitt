name: Publish

on:
  release:
    types: [published]

jobs:
  npm:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      with:
        ref: build

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        registry-url: "https://registry.npmjs.org/"
    
    - name: Install Dependencies
      run: |
        corepack enable
        pnpm install --ignore-scripts
      env:
        CI: true
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish Package
      run: pnpm publish --access public --no-git-checks --ignore-scripts
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: build

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        registry-url: "https://registry.npmjs.org/"

    - name: Install Dependencies
      run: |
        corepack enable
        pnpm install --ignore-scripts
      env:
        CI: true
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Setup GitHub Packages Registry
      run: npm config set @eoussama:registry https://npm.pkg.github.com

    - name: Publish Package
      run: |
        npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
        pnpm publish --no-git-checks --ignore-scripts
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
